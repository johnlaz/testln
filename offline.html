<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LazNote — Offline</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0b0d0a;
      color: #e8e4dc;
      font-family: 'DM Sans', system-ui, sans-serif;
      text-align: center;
      padding: 2rem;
      gap: 1.5rem;
    }
    .pulse {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: #a3e635;
      box-shadow: 0 0 0 0 rgba(163,230,53,0.6);
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(163,230,53,0.5); }
      50%        { box-shadow: 0 0 0 20px rgba(163,230,53,0); }
    }
    h1 { font-size: clamp(1.5rem, 5vw, 2.25rem); font-weight: 600; letter-spacing: -0.02em; }
    p  { color: #9a9488; font-size: 1rem; max-width: 28ch; line-height: 1.6; }
    small { color: #5a5650; font-size: 0.75rem; }
    a {
      display: inline-block;
      margin-top: 0.5rem;
      padding: 0.75rem 2rem;
      background: #a3e635;
      color: #0b0d0a;
      font-weight: 700;
      border-radius: 999px;
      text-decoration: none;
      font-size: 0.9rem;
      letter-spacing: 0.03em;
    }
  </style>
</head>
<body>
  <div class="pulse"></div>
  <h1>You're offline</h1>
  <p>LazNote needs a connection for this page. Your notes in the app are safe on-device.</p>
  <a href="/laznote/">Try again</a>
  <small>Local-first · your data never left</small>
</body>
</html>
